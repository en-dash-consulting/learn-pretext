<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#09090b"/>
  <!-- Subtle accent glow -->
  <ellipse cx="600" cy="250" rx="400" ry="200" fill="#818cf8" opacity="0.06"/>
  <!-- Accent bar (matches header logo) -->
  <rect x="520" y="180" width="8" height="48" rx="3" fill="url(#grad)"/>
  <!-- Title -->
  <text x="545" y="220" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ededf0">Learn Pretext</text>
  <!-- Tagline -->
  <text x="600" y="280" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#a0a0b0" text-anchor="middle">Text layout at the speed of arithmetic</text>
  <!-- Description -->
  <text x="600" y="330" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#5c5c6e" text-anchor="middle">Interactive demos and tutorials for @chenglou/pretext</text>
  <!-- Divider -->
  <line x1="500" y1="380" x2="700" y2="380" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Built by -->
  <text x="600" y="420" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#5c5c6e" text-anchor="middle">A free learning resource by En Dash Consulting</text>
  <text x="600" y="445" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#818cf8" text-anchor="middle" opacity="0.7">endash.us</text>
  <!-- Decorative measurement lines (theme of the site) -->
  <rect x="120" y="500" width="180" height="3" rx="1.5" fill="#818cf8" opacity="0.08"/>
  <rect x="340" y="510" width="120" height="3" rx="1.5" fill="#818cf8" opacity="0.05"/>
  <rect x="720" y="505" width="200" height="3" rx="1.5" fill="#818cf8" opacity="0.06"/>
  <rect x="960" y="495" width="140" height="3" rx="1.5" fill="#818cf8" opacity="0.04"/>
  <rect x="200" y="520" width="90" height="3" rx="1.5" fill="#818cf8" opacity="0.04"/>
  <rect x="800" y="520" width="160" height="3" rx="1.5" fill="#818cf8" opacity="0.07"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
</svg>
