ingle files (hub files). Circular dependencies. Unbalanced language distribution.",actions:"Check module status table to see which analysis phases have completed. Run additional 'sourcevision analyze' passes for deeper AI-generated insights."},graph:{title:"Import Graph",description:"Force-directed visualization of the import graph. Nodes are colored by zone. Cross-zone edges are highlighted in orange.",lookFor:"Dense clusters suggest tightly-coupled modules. Orange cross-zone edges indicate zone boundary violations. Isolated nodes may be dead code.",actions:"Click nodes to inspect. Look for hub files that could be split. Consider if cross-zone imports suggest zones should be merged or boundaries clarified."},zones:{title:"Zones",description:"Architectural zones detected by Louvain community detection. Each zone groups files with strong internal import connections.",lookFor:"Cohesion < 0.4 means files in a zone aren't well-related \u2014 consider splitting. Coupling > 0.6 means heavy cross-zone dependencies. Large zones (>50 files) may need decomposition.",actions:"Click a zone to see its files and entry points. Review AI-generated insights. Check if zone boundaries match your intended architecture."},files:{title:"Files",description:"Sortable, filterable table of all project files with language, role, size, and category information.",lookFor:"Very large files (>500 lines) that might benefit from splitting. Files classified as 'other' role that should be reclassified. Category groupings that reveal organizational patterns.",actions:"Sort by line count to find the largest files. Filter by role to focus on source, test, or config files. Use search to locate specific files."},routes:{title:"Routes",description:"Route tree showing React Router v7 / Remix file-based routes with their convention exports (loader, action, meta, etc).",lookFor:"Route modules missing loaders (data fetching). Missing ErrorBoundary exports. Deep layout nesting. Routes without meta exports (SEO
